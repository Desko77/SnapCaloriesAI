services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: snapcalories
      POSTGRES_USER: snap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snap}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snap -d snapcalories"]
      interval: 5s
      retries: 5

  bot:
    image: desko77/snapcaloriesai:latest
    build: .
    env_file: .env
    environment:
      - TZ=Europe/Moscow
      - DATABASE_URL=postgresql+asyncpg://snap:${POSTGRES_PASSWORD:-snap}@db:5432/snapcalories
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
